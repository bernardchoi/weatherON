services:
  - type: web
    name: weatheron-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: WEATHER_SERVER_HOST
        value: 0.0.0.0
      - key: WEATHER_TIMEOUT_MS
        value: 8000
      - key: WEATHER_CACHE_TTL_MS
        value: 600000
      - key: PLACE_CACHE_TTL_MS
        value: 1800000
      - key: ROUTE_CACHE_TTL_MS
        value: 600000
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: KMA_SERVICE_KEY
        sync: false
