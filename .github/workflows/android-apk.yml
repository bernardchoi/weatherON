name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-apk.yml"
      - "apps/mobile/**"
      - "packages/**"
      - "assets/**"
      - "package.json"
      - "package-lock.json"

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_WEATHER_CLIENT: "fixture"
      EXPO_PUBLIC_WEATHER_TIMEOUT_MS: "8000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npx tsc -p apps/mobile/tsconfig.json --noEmit

      - name: Check Android product quality
        run: npm run check:android-product-quality

      - name: Generate Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build standalone APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weatheron-standalone-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
